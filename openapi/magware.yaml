            type: string
            description: Custom attribute name
            example: a_custom_string
          value:
            type: string
            description: Custom attribute value. Can be a string, an integer, a boolean or a decimal number
            example: lorem ipsum doloret
    shipment_creation:
      title: shipment_creation
      type: object
      required:
        - code
        - date
        - deliveries
      properties:
        code:
          type: string
          maxLength: 250
          description: |-
            Shipment code/number, generated by host system.
            Can be, for example, delivery note number
        date:
          type: string
          format: date
          description: |-
            Shipment date, generated by host system.
            Can be, for example, delivery note date
        deliveries:
          type: array
          description: |-
            Arrays of deliveries to be included in the shipment.

            The deliveries must be in a prepared state, have the ship_on_demand flag set to true, and share the same destination, billing details, and characteristics.
          items:
            type: string
            maxLength: 100
            example: "00012345"
        documents:
          type: array
          description: |-
            Arrays of documents in PDF format generated for the shipment.

            These may include a delivery note, waybill, packing list, invoice, or a combination of these.
          items:
            $ref: "#/components/schemas/documents"
        courier_code:
          type: string
          maxLength: 15
          description: |-
            Optional courier code.
            Can be used to override the currently assigned courier to the deliveries
          example: DHLEXP
        destination:
          type: object
          description: |-
            Optional destination, overriding the destinations specified in deliveries.
            If not provided, the shipment defaults to the destination of the first delivery in the `deliveries` array.
          required:
            - code
            - name
            - address
          properties:
            code:
              type: string
              maxLength: 50
              example: C12345
            name:
              type: string
              maxLength: 100
              example: Mario Rossi
            address:
              $ref: "#/components/schemas/address"
            custom_attributes:
              $ref: "#/components/schemas/custom_attributes"
        cash_on_delivery:
          type: object
          description: Optional cash on delivery (COD) value
          required:
            - currency
            - value
          properties:
            currency:
              type: string
              maxLength: 3
              minLength: 3
              description: 3-digit ISO 4217 Cash On Delivery currency. Conventional value is "EUR".
            value:
              type: string
              description: Cash On Delivery total amount
              example: "12.55"
            type:
              type: string
              maxLength: 4000
              description: Cash on delivery type, depend on courier
        custom_attributes:
          $ref: "#/components/schemas/custom_attributes"
    documents:
      title: documents
      type: object
      x-examples:
        Example 1:
          code: INV12345
          date: "2019-08-24"
          type: Invoice
          print: true
          content: Y29tcGxleCBkYXRhIGluIFhNTCBvciBKU09OLg==
      description: |-
        Arrays of documents in PDF format.

        These may include a delivery note, waybill, packing list, invoice, or a combination of these.
      required:
        - content
      properties:
        code:
          type: string
          description: Code or number of the document
        date:
          type: string
          format: date
          description: Date of the document
        type:
          type: string
          description: Type of the document. Example "Delivery notes" or "Invoice"
        print:
          type: boolean
          description: Indicates that the document must be printed.
        content:
          type: string
          description: PDF document, encoded in base64 format
          example: Y29tcGxleCBkYXRhIGluIFhNTCBvciBKU09OLg==
    success:
      title: Success envelope
      type: object
      description: Standard envelope for a successful single-resource operation.
      required:
        - status
        - description
      properties:
        status:
          type: string
          enum:
            - success
          description: Always `success` for HTTP 2xx responses.
        description:
          type: string
          description: Human-readable confirmation message.
    error_response:
      title: Error envelope
      type: object
      description: |-
        Standard envelope returned for any 4xx/5xx response (with one
        documented exception: see the 404 known issue in Magware backend).
        The envelope is intentionally minimal — there is no machine-readable
        `error_code`. Integrators should rely on the HTTP status to branch
        logic and use `description` for diagnostic/log purposes only.
      required:
        - status
        - description
      properties:
        status:
          type: string
          enum:
            - error
          description: Always `error` for HTTP 4xx/5xx responses.
        description:
          type: string
          description: Human-readable error description (English, suitable for logs and dev-facing UIs, not for end-users).
    bulk_item_result:
      title: Bulk item result
      type: object
      description: |-
        Outcome of a single item inside a bulk creation request. The bulk
        endpoint returns one entry per input item; the HTTP status of the
        whole call is `200` even if some entries report `error`.
      required:
        - position
        - item_code
        - status
        - description
      properties:
        position:
          type: integer
          minimum: 0
          description: Zero-based index of the item in the input array.
        item_code:
          type: string
          maxLength: 200
          description: Echo of the input item `code` (useful when `position` is not enough to identify the item in client-side logs).
        status:
          type: string
          enum:
            - success
            - error
          description: Outcome for this specific item.
        description:
          type: string
          description: Confirmation message when `status` is `success`, error description when `status` is `error`.
  securitySchemes:
    APIKey:
      type: apiKey
      in: header
      name: APIKey
      description: API key issued by Restore in onboarding. Identifies the integrator.
    Owner:
      type: apiKey
      in: header
      name: owner
      description: |-
        Tenant code (max 15 chars), issued by Restore in onboarding alongside
        the `APIKey`. Identifies the Magware tenant the request operates on.
        An API key is bound 1:1 to its `owner` — they must always be sent
        together and cannot be mixed across tenants.
  responses:
    success:
      description: |-
        Resource successfully created or updated. Body is the standard
        success envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/success"
          examples:
            example:
              value:
                status: success
                description: "Resource created"
    error:
      description: |-
        Bad request — payload validation failed, business rule violated, or
        the requested operation is not implemented for this resource. Body
        is the standard error envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/error_response"
          examples:
            empty_payload:
              summary: Empty request body
              value:
                status: error
                description: "Empty payload"
            validation:
              summary: Business validation
              value:
                status: error
                description: "Item '1234567890AB' already exists"
    unauthorized:
      description: |-
        Authentication failed: missing or invalid `APIKey` header, missing
        or invalid `owner` header, or the `APIKey` does not match the one
        configured for the given `owner`.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/error_response"
          examples:
            missing_apikey:
              summary: Missing or invalid APIKey
              value:
                status: error
                description: "Invalid 'APIKey' header"
            missing_owner:
              summary: Missing or invalid owner
              value:
                status: error
                description: "Invalid 'owner' header"
            wrong_apikey:
              summary: APIKey not authorized for the given owner
              value:
                status: error
                description: "Unauthorized APIKey for owner 'RST'"
    not_found:
      description: |-
        The requested resource does not exist for the given `owner` (e.g.
        an item code, ASN id, delivery id, shipment id, or adjustment id
        that has never been created or has already been acquired by a
        previous detail call).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/error_response"
          examples:
            not_found:
              value:
                status: error
                description: "Item with code '1234567890AB' not found for owner 'RST'"
    internal_server_error:
      description: |-
        Unexpected server error (uncaught runtime exception). The
        `description` field includes the raw error message for diagnostic
        purposes; integrators should not parse it.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/error_response"
          examples:
            example:
              value:
                status: error
                description: "Internal error, unable to process the request. <details>"
    object_list:
      description: List of Magware objects
      content:
        application/json:
          schema:
            type: array
            items:
              type: integer
              format: int32
          examples:
            example:
              value:
                - 12131237
                - 43534534
                - 77539764
      headers: {}
  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: integer
        example: 55134833
      description: Unique identification number of Magware object
tags:
  - name: Items
    description: >-
      Item master data: create new items, update existing ones, fetch item details, and check existence (single or
      batch).
  - name: ASN
    description: >-
      Advanced Shipping Notices: notify the WMS that goods are about to arrive at the warehouse, then poll the list of
      received ASNs and fetch their details.
  - name: Deliveries
    description: >-
      Outbound delivery orders: create a new delivery order, then poll the lists of prepared and cancelled orders and
      fetch their details.
  - name: Delivery Notes
    description: >-
      Delivery notes (DDT) generated by the WMS for prepared shipments: list prepared notes and fetch the details of
      each one.
  - name: Shipments
    description: >-
      Shipments dispatched from the warehouse: create a new shipment, list dispatched shipments, and fetch
      tracking/delivery details.
  - name: Inventory
    description: >-
      Warehouse inventory: query stock levels by item or warehouse-wide, and retrieve adjustments (corrections to stock
      quantities).
  - name: Utility
    description: Service and diagnostic endpoints (e.g. API version).
servers:
  - url: https://sandbox.magware.it:9999
    description: Sandbox
security:
  - APIKey: []
    Owner: []
