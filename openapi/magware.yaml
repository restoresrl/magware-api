openapi: 3.1.0
info:
  title: Magware API
  version: 0.1.0
  description: |
    # Magware API

    The Magware API is a REST-based web service for integrating external Host
    systems with the Magware Warehouse Management System (WMS). It exposes a
    standardized interface to manage the full warehouse lifecycle: item master
    data, inbound goods (ASN), outbound delivery orders, delivery notes,
    shipments, inventory adjustments and stock queries.

    ## Endpoints

    This reference documents the public **sandbox** endpoint:
    `https://sandbox.magware.it:9999`. Production URLs are tenant-specific
    and provided by Restore during customer onboarding.

    ## Authentication

    Every request requires two headers, both issued by Restore in onboarding:

    - `APIKey` — identifies the integrator
    - `owner` — identifies the Magware tenant the request operates on (max
      15 characters)

    The two are bound 1:1 (an `APIKey` is valid only on its `owner`) and
    are declared together as a combined security scheme — most API tools
    (Scalar, Postman, generated SDKs) expose them in a single "Authorize"
    panel rather than as per-request parameters.

    Missing or invalid values return `401 Unauthorized` with the standard
    error envelope.

    ## Errors

    All error responses share a minimal envelope:

    ```json
    { "status": "error", "description": "Item '1234567890AB' already exists" }
    ```

    There is no machine-readable `error_code` — branch on the HTTP status
    code and use `description` for diagnostic/log purposes only. The HTTP
    statuses returned by the API are:

    - `400 Bad Request` — payload validation failed or business rule
      violated (e.g. duplicate code, missing required field).
    - `401 Unauthorized` — missing or invalid `APIKey`/`owner`.
    - `404 Not Found` — the resource id does not exist (or has already
      been acquired by a previous detail call, see polling pattern below).
    - `500 Internal Server Error` — unexpected runtime error.

    `409 Conflict` and `422 Unprocessable Entity` are **not** used by the
    API — duplicates and validation errors are signalled as `400`.

    ## Polling pattern: "List → Details"

    Magware uses a polling-based synchronization model rather than pushing
    events. Integrators retrieve resources in two phases.

    **1. Retrieve list** — a `GET` on the resource collection returns an
    array of IDs of records ready to be processed:

    ```http
    GET /deliveries/prepared
    GET /asn/received
    GET /delivery_notes/prepared
    ```

    Response:

    ```json
    [12131237, 43534534, 77539764]
    ```

    **2. Retrieve details** — for each ID, a `GET` on the detail endpoint
    returns the full record:

    ```http
    GET /deliveries/prepared/{id}
    ```

    The successful detail call **acts as the acknowledgment**: Magware
    automatically marks the record as transmitted and removes it from the
    next list response. If the detail call fails (network error, timeout),
    the record stays in the list and is returned again on the next poll —
    no data is lost.

    Recommended polling frequency: **5 minutes** for list endpoints, with
    detail calls fired immediately after IDs are received.

    ## Webhook alternative

    For latency-sensitive use cases, **webhook notifications** are available
    on a custom-project basis. Webhooks deliver event-driven updates with
    automatic retry and signature-based payload verification. Contact
    `support@re-store.it` for setup and pricing.

    ## Reporting issues

    If you find inconsistencies or errors in this documentation, please
    report them to `support@re-store.it`. We recommend always starting
    integration on the sandbox before moving to production.
  contact:
    name: Magware Support Team
    url: http://support.re-store.it
    email: support@re-store.it
  license:
    name: (C) 2022-2025 Restore SRL
    url: https://www.re-store.it
paths:
  /items:
    post:
      summary: Create one or more items
      operationId: post-items
      description: |-
        Create an item to be managed by the warehouse.

        The request body can be either a **single item object** or an **array
        of item objects** (up to 100) for bulk creation. Both forms return
        HTTP `200`, but the response body shape differs:

        - Single item → `success` envelope (`{status, description}`).
        - Bulk array → array of per-item results, where each entry reports
          `success` or `error` independently. The HTTP status is `200` even
          if some items in the array failed; check each element's `status`
          field.
      responses:
        "200":
          description: |-
            Creation result. The body shape depends on the request body
            shape: a single envelope for a single-item request, an array
            of per-item results for a bulk request.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/success"
                  - type: array
                    items:
                      $ref: "#/components/schemas/bulk_item_result"
              examples:
                single:
                  summary: Single item created
                  value:
                    status: success
                    description: "Item '1234567890AB' created"
                bulk_mixed:
                  summary: Bulk result with one success and one error
                  value:
                    - position: 0
                      item_code: "1234567890AB"
                      status: success
                      description: "Item '1234567890AB' created"
                    - position: 1
                      item_code: "999999999"
                      status: error
                      description: "Item '999999999' already exists"
        "400":
          $ref: "#/components/responses/error"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal_server_error"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/item"
                - type: array
                  description: Bulk creation. Up to 100 items in a single call.
                  items:
                    $ref: "#/components/schemas/item"
                  minItems: 1
                  maxItems: 100
            examples:
              single:
                summary: Single item
                value:
                  code: 1234567890AB
                  description: A red pretty t-shirt
                  um: PCS
                  warehouse_category:
                    code: "001"
                    description: Clothing
                  owner_category:
                    code: "001"
                    description: T-shirt
                  variants:
                    - code: "10"
                      description: XXS
                      quantity: 1
                      barcodes:
                        - "1234567890123"
                      volume: 0.12
                      weight: 1.23
                      shippable: false
                  lot_control: false
                  serial_number_control: false
                  expiration_date_control: false
                  expedition_date_control: true
                  expedition_days: 0
                  obsolete: false
              bulk:
                summary: Bulk creation (array of items)
                value:
                  - code: 1234567890AB
                    description: A red pretty t-shirt
                    um: PCS
                    variants:
                      - code: "10"
                        description: XXS
                        quantity: 1
                  - code: 545664789AB
                    description: Red wine
                    um: PCS
                    variants:
                      - code: "-"
                        description: "-"
                        quantity: 1
      tags:
        - Items
  /items/{item_code}:
    summary: Path used to manage a single item.
    description: >-
      The REST endpoint/path used to get, update, and delete single instances of an `item`.  This path contains `GET`,
      `PUT`, and `DELETE` operations used to perform the get, update, and delete tasks, respectively.
    put:
      requestBody:
        description: Updated item details
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/item"
        required: true
      operationId: put-items-item_code
      summary: Update an item
      description: |-
        Updates an existing item identified by `item_code`. The request body
        is the full item representation (same schema used by POST).

        Variants are upserted: if `variants[i].code` matches an existing
        variant, that variant is updated; otherwise a new variant is
        created. Once a variant exists, its `quantity` field is
        **immutable** — sending a `variants[i].quantity` value different
        from the persisted one returns `400 Bad Request` with description
        `"Quantity for variant '<code>' for item '<item>' can't be updated"`.
      responses:
        "200":
          $ref: "#/components/responses/success"
        "400":
          $ref: "#/components/responses/error"
        "404":
          $ref: "#/components/responses/not_found"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal_server_error"
      tags:
        - Items
    parameters:
      - name: item_code
        description: A unique identifier for a `item`, URL encoded.
        schema:
          type: string
          maxLength: 200
          example: 123456789AB
        in: path
        required: true
    get:
      summary: Get item details
      operationId: get-items-item_code
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/item"
        "404":
          $ref: "#/components/responses/not_found"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal_server_error"
      tags:
        - Items
      description: Returns item details
    head:
      summary: Check if one item exists
      operationId: head-items-item_code
      responses:
        "200":
          description: OK
        "404":
          description: Not Found
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal_server_error"
      description: Check if an item exists
      tags:
        - Items
  /items/exists:
    post:
      summary: Check if items exists
      tags:
        - Items
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    item:
                      $ref: "#/components/schemas/item_reference"
                    exists:
                      type: boolean
                      description: true if item/variant exists in Magware
              examples:
                Example 1:
                  value:
                    - item:
                        code: A000010003
                        variant: "01"
                      exists: true
                    - item:
                        code: A000010003
                        variant: "02"
                      exists: true
                    - item:
                        code: "123456789"
                        variant: "-"
                      exists: false
        "400":
          $ref: "#/components/responses/error"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal_server_error"
      operationId: post-items-exists
      description: |-
        Checks whether one or more item/variant pairs exist in Magware.
        Accepts a list of `item_reference` objects and returns their
        existence status (one entry per input, in the same order).

        **Note**: although `variant` is technically optional in the
        `item_reference` schema, this endpoint requires it — the backend
        joins on both `code` and `variant`, so an entry without `variant`
        will always return `exists: false`.

        Intended to validate item presence before performing further
        operations (e.g. inventory updates, order processing).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              description: |-
                Array of item/variant pairs to check. Up to 10000 entries
                per call (a larger array returns `400 Bad Request`).
              items:
                $ref: "#/components/schemas/item_reference"
              minItems: 1
              maxItems: 10000
            examples:
              Example 1:
                value:
                  - code: A000010003
                    variant: "01"
                  - code: A000010003
                    variant: "02"
                  - code: "123456789"
                    variant: "-"
  /asn:
    post:
      summary: Create a new ASN
      operationId: post-asn
      responses:
        "201":
          $ref: "#/components/responses/success"
        "400":
          $ref: "#/components/responses/error"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal_server_error"
      description: Create a new Advanced Shipping Notice that must be received by the warehouse
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/asn_creation"
      tags:
        - ASN
  /asn/received:
    get:
      summary: Get received ASN list
      operationId: get-asn-received
      description: Return a list of received ASNs, not yet acquired by Host system
      responses:
        "200":
          $ref: "#/components/responses/object_list"
        "400":
          $ref: "#/components/responses/error"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal_server_error"
      tags:
        - ASN
  /asn/received/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 55134833
        description: Unique identification number of a Magware object
    get:
      summary: Get received ASN details
      operationId: get-asn-received-id
      description: "Return information about a received ASN and mark it as acquired by host system "
      responses:
        "200":
          description: Received ASN details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/asn_received_details"
              examples:
                example-1:
                  value:
                    asn_code: ASN123456
                    supplier: F0001
                    delivery_note:
                      code: D123456AB
                      date: "2021-06-09"
                    movement_type:
                      code: P001
                      description: Purchase from supplier
                    arrival_date: "2021-06-24"
                    stock_date: "2021-06-26"
                    items:
                      - row_number: 1
                        item:
                          code: A000010003
                          variant: "01"
                        expected_quantity: 5
                        received_quantity: 4
                        stock_type: AVAIL
                        reference: "5000123401"
                      - row_number: 1
                        item:
                          code: A000010003
                          variant: "01"
                        expected_quantity: 5
                        received_quantity: 1
                        stock_type: FLAWED
                        reference: "5000123401"
                      - row_number: 2
                        item:
                          code: A000010005
                          variant: "01"
                        expected_quantity: 7
                        received_quantity: 7
                        stock_type: AVAIL
                        reference: "5000123402"
        "404":
          $ref: "#/components/responses/not_found"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal_server_error"
      tags:
        - ASN
  /deliveries:
    post:
      summary: Create a new delivery order
      operationId: post-deliveries
      responses:
        "201":
          $ref: "#/components/responses/success"
        "400":
          $ref: "#/components/responses/error"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal_server_error"
      description: Create a delivery order that must be fulfilled by the warehouse
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/delivery_creation"
      tags:
        - Deliveries
  /deliveries/prepared:
    get:
      summary: Get prepared delivery list
      responses:
        "200":
          $ref: "#/components/responses/object_list"
        "400":
          $ref: "#/components/responses/error"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal_server_error"
      operationId: get-deliveries-prepared
      description: Return a list of prepared deliveries not yet acquired by Host
      tags:
        - Deliveries
  /deliveries/prepared/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 55134833
        description: Unique identification number of Magware object
    get:
      summary: Get prepared delivery details
      operationId: get-deliveries-prepared-id
      description: Return detailed information about a prepared delivery order and mark it as acquired by host system
      responses:
        "200":
          description: Prepared delivery details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/delivery_prepared_details"
              examples:
                Prepared delivery:
                  value:
                    code: "800123456"
                    preparation_date: "2019-08-24T14:15:22Z"
                    cancelled: false
                    courier_code: DHLEXP
                    delivery_note:
                      code: DEL00000001
                      date: "2021-06-24"
                    weight: 12
                    volume: 0.45
                    channel: WS
                    packages:
                      - code: XU12345
                        alternative_code: "11112222333344445555"
                        weight: 12
                        volume: 0.45
                        package_type: T1
                        items:
                          - row_number: 1
                            item:
                              code: A000010003
                              variant: "01"
                            quantity: 1
                            reference: aaabbbcc
        "400":
          $ref: "#/components/responses/error"
        "404":
          $ref: "#/components/responses/not_found"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal_server_error"
      tags:
        - Deliveries
  /deliveries/cancelled:
    get:
      summary: Get cancelled delivery list
      responses:
        "200":
          $ref: "#/components/responses/object_list"
        "400":
          $ref: "#/components/responses/error"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal_server_error"
      operationId: get-deliveries-cancelled
      description: Return a list of cancelled (not fulfilled) deliveries not yet acquired by Host
      tags:
        - Deliveries
  /deliveries/cancelled/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 55134833
        description: Unique identification number of Magware object
    get:
      summary: Get cancelled delivery details
      operationId: get-deliveries-cancelled-id
      description: Return information about a cancelled (not fulfilled) delivery order and mark it as acquired by host system
      responses:
        "200":
          description: Cancelled delivery details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/delivery_cancelled_details"
              examples:
                Cancelled delivery:
                  value:
                    code: "800123456"
                    cancellation_date: "2019-08-24T14:15:22Z"
                    channel: WS
        "400":
          $ref: "#/components/responses/error"
        "404":
          $ref: "#/components/responses/not_found"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal_server_error"
      tags:
        - Deliveries
  /shipments:
    post:
      summary: Create shipment
      tags:
        - Shipments
      responses:
        "201":
          $ref: "#/components/responses/success"
        "400":
          $ref: "#/components/responses/error"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal_server_error"
      operationId: post-shipments
      description: |-
        Create a shipment for one or more deliveries to the same destination.
        This API allows you to unlock the shipment of a delivery when the `ship_on_demand` flag is set to `true`.

        Additionally, it enables the transmission of the delivery note code and date, and related documents in PDF format.

        You can also use this API to group multiple deliveries into a single shipment, provided that all deliveries share the same destination, billing details, and shipping conditions.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/shipment_creation"
    get:
      summary: Get shipments list
      operationId: get-shipments
      description: Return a list of shipments not yet acquired by Host
      responses:
        "200":
          $ref: "#/components/responses/object_list"
        "400":
          $ref: "#/components/responses/error"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal_server_error"
      tags:
        - Shipments
  /shipments/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      summary: Get shipment details
      responses:
        "200":
          description: Shipment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/shipment_details"
              examples:
                example-1:
                  value:
                    code: "000001"
                    date: "2021-06-24"
                    time: 14:15:22Z
                    courier_code: DHLEXP
                    deliveries:
                      - delivery_code: DEL000001
                        tracking_code: AWB000001
                        tracking_link: https://example.com/123456
                        tracking_id: 123456789
        "400":
          $ref: "#/components/responses/error"
        "404":
          $ref: "#/components/responses/not_found"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal_server_error"
      operationId: get-shipments-id
      description: "Return detailed information about a shipment and mark it as acquired by host system "
      tags:
        - Shipments
  /adjustments:
    get:
      summary: Get adjustments list
      tags:
        - Inventory
      operationId: get-adjustments
      description: Return a list of adjustments not yet acquired by Host
      responses:
        "200":
          $ref: "#/components/responses/object_list"
        "400":
          $ref: "#/components/responses/error"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal_server_error"
  /adjustments/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      summary: Get adjustment details
      tags:
        - Inventory
      responses:
        "200":
          description: Adjustment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/adjustment"
              examples:
                Example 1:
                  value:
                    code: "800123456"
                    reason_code: LACK
                    sign: +
                    date: "2019-08-24"
                    time: 14:15:22Z
                    items:
                      - item:
                          code: A000010003
                          variant: "01"
                        stock_type: string
                        quantity: 12
                        lot_number: string
                        serial_number: string
                        expiration_date: "2019-08-24"
                        expedition_date: "2019-08-24"
        "400":
          $ref: "#/components/responses/error"
        "404":
          $ref: "#/components/responses/not_found"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal_server_error"
      operationId: get-adjustments-id
      description: Return adjustment details
  /stocks:
    get:
      summary: Get warehouse stock
      tags:
        - Inventory
      responses:
        "200":
          description: List of items with stock
          content:
            application/json:
              schema:
                type: object
                properties:
                  date:
                    type: string
                    format: date
                    example: "2021-06-26"
                  time:
                    type: string
                    format: time
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/item_stock"
              examples:
                example-1:
                  value:
                    date: "2021-06-26"
                    time: 14:15:22Z
                    items:
                      - item:
                          code: A000010003
                          variant: "01"
                        stock_type: AVAIL
                        quantity: 12
                        reserved_quantity: 3
                        variant_quantity: 15
                        variant_reserved_quantity: 3
                      - item:
                          code: A000010005
                          variant: "01"
                        stock_type: FLAWED
                        quantity: 2
                        reserved_quantity: 0
                        variant_quantity: 2
                        variant_reserved_quantity: 0
        "400":
          $ref: "#/components/responses/error"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal_server_error"
      operationId: get-stocks
      description: Return list of items that currently have stock in the warehouse
  /stocks/{item_code}:
    parameters:
      - schema:
          type: string
          maxLength: 200
        name: item_code
        in: path
        required: true
        description: Item code of product to query
    get:
      summary: Get item stock
      tags:
        - Inventory
      responses:
        "200":
          description: Item stock
          content:
            application/json:
              schema:
                type: object
                properties:
                  date:
                    type: string
                    format: date
                    example: "2021-06-23"
                  time:
                    type: string
                    format: time
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/item_stock"
              examples:
                example-1:
                  value:
                    date: "2021-06-23"
                    time: 14:15:22Z
                    item:
                      item:
                        code: A000010003
                        variant: "01"
                      stock_type: AVAIL
                      quantity: 12
                      reserved_quantity: 3
                      variant_quantity: 15
                      variant_reserved_quantity: 3
        "400":
          $ref: "#/components/responses/error"
        "401":
          $ref: "#/components/responses/unauthorized"
        "500":
          $ref: "#/components/responses/internal_server_error"
      operationId: get-stocks-item_code
      description: |-
        Return current stock of a single item identified by `item_code`.

        **Note**: this endpoint does not emit `404` if the item does not
        exist for the given `owner` — it always returns `200` with an
        empty `items: []` array. Use `HEAD /items/{item_code}` (or
        `POST /items/exists`) if you need to distinguish "item not found"
        from "item found but with no stock".
  /delivery_notes/prepared:
    get:
      summary: Get prepared delivery notes list
      responses:
        "200":
          $ref: "#/components/responses/object_list"
        "400":
