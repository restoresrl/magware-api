      title: Item model
      required:
        - code
        - um
        - variants
      properties:
        code:
          type: string
          description: Code (SKU) of the item. Must be unique for a owner
          maxLength: 200
          example: 1234567890AB
        description:
          type: string
          description: Default description of item
          maxLength: 255
        um:
          type: string
          description: Unit of measure of item (typically selling unit)
          maxLength: 5
          example: PCS
        note:
          type: string
          maxLength: 255
        warehouse_category:
          type: object
          description: Item category defined by warehouse. It can be shared with items of other owners
          properties:
            code:
              type: string
              maxLength: 20
              example: "001"
            description:
              type: string
              maxLength: 255
              example: Clothing
        owner_category:
          type: object
          description: Item category defined by the owner. It's a specific categorization define by the owner of the item
          properties:
            code:
              type: string
              maxLength: 50
              example: "001"
            description:
              type: string
              maxLength: 255
              example: T-shirt
        variants:
          type: array
          description: >-
            Variants represent different physical configurations of an item. For example, variants can be used to
            indicate different packaging of a food product or different sizes of an item of clothing
          items:
            type: object
            minProperties: 1
            required:
              - code
              - description
              - quantity
            properties:
              code:
                type: string
                maxLength: 50
                example: "10"
                description: Variant code. Must be unique in the item
              description:
                type: string
                maxLength: 255
                example: XXS
                description: Variant description
              quantity:
                description: >-
                  Indicate the physical quantity in UoM of the item of the variant. Usually it is 1. If greater than 1
                  it indicates a variant that contains a multiple of the sales unit (example 12 pieces pack).If less
                  than 1 it indicates products managed in decimal units and the necessary precision (for example a
                  fabric with quantity variant = 0.001 and UoM = m2 indicates that the fabric is managed in m2 with an
                  accuracy of one cm2)
                example: 1
                format: decimal
                type: number
                minimum: 0.001
              barcodes:
                type: array
                uniqueItems: true
                description: Array of barcodes that uniquely identify the item and the variant. Must be unique for the owner
                items:
                  type: string
                  maxLength: 100
                  example: "1234567890123"
              volume:
                type: number
                format: decimal
                description: Variant/package volume in m3. If specified must be greater than 0
                example: 0.01
                default: 0.01
                minimum: 0.000001
              weight:
                type: number
                format: decimal
                description: Gross weight of the variant/package in Kg. If specified must be greater than 0
                example: 0.123456
                default: 0.1
                minimum: 0.000001
              shippable:
                type: boolean
                description: Indicates that the item package is shippable without need of an external package or re-packaging
                default: false
              default:
                type: boolean
                default: false
                description: Indicates that this variant is the default one for the item
              quantity_per_package:
                type: integer
                example: 12
                description: Default quantity per package, expressed in number of whole variants per package.
                minimum: 1
        lot_control:
          type: boolean
          default: false
          description: Indicates that lot control and tracking is needed for the item
        serial_number_control:
          type: boolean
          default: false
          description: Indicates that serial number control and tracking is needed for the item
        expiration_date_control:
          type: boolean
          default: false
          description: Indicates that expiration date control and tracking is needed for the item
        expedition_date_control:
          type: boolean
          description: Indicates that expedition date control and tracking is needed for the item
          default: false
        expedition_days:
          type: integer
          deprecated: true
          description: |-
            Number of days for expedition date calculation from expiration date.

            **Not yet implemented; reserved for future use.** The backend
            currently ignores this field on POST/PUT and does not return it
            on GET. Do not rely on its value.
        obsolete:
          type: boolean
          description: Indicates that the item is obsolete and no more managed in the future
          default: false
        variable_weight:
          type: boolean
          description: Indicates that the item has variable weights (e.g. meat, fish, cheese)
          default: false
        variable_volume:
          type: boolean
          description: Indicates that the item has variable volume
          default: false
        can_be_added_to_deliveries:
          type: boolean
          description: |-
            Indicates whether the item can be included as additional, unplanned goods in the deliveries. This field allows the system to flag items that are not originally scheduled for the delivery but can still be added as extras if needed.

            - `true`: The item can be added as an extra to the delivery.
            - `false`: The item cannot be added as an extra to the delivery.
          default: false
        supplier:
          type: object
          description: Supplier item information
          required:
            - code
            - name
          properties:
            code:
              type: string
              maxLength: 50
              description: Supplier identification code
            name:
              type: string
              maxLength: 100
              description: Supplier name
            item:
              type: object
              description: "Supplier item code "
              required:
                - code
                - description
              properties:
                code:
                  type: string
                  maxLength: 255
                  description: "Supplier item code "
                description:
                  type: string
                  maxLength: 500
                  description: Supplier item description
        custom_attributes:
          $ref: "#/components/schemas/custom_attributes"
    asn_creation:
      title: ASN creation model
      type: object
      description: Model for creation of ASN
      x-examples:
        Example 1:
          code: ASN123456
          arrival_date: "2021-06-10"
          stock_type: AVAIL
          supplier:
            code: F0001
            name: Supplier srl
          delivery_note:
            code: D123456AB
            date: "2021-06-09"
          movement_type:
            code: P001
            description: Purchase from supplier
          contents:
            - row_number: 1
              item:
                code: A000010003
                variant: "01"
              quantity: 5
              reference: "5000123401"
              custom_attributes:
                - name: a_custom_string
                  value: lorem ipsum doloret
          attributes:
            - name: a_custom_string
              value: lorem ipsum doloret
      required:
        - code
        - supplier
        - movement_type
        - delivery_note
        - arrival_date
        - contents
      properties:
        code:
          type: string
          description: ASN identification code, assigned by ERP
          maxLength: 100
          example: ASN123456
        arrival_date:
          type: string
          format: date
          example: "2021-06-10"
        stock_type:
          type: string
          maxLength: 50
          description: Logical warehouse
          example: AVAIL
        supplier:
          description: Supplier information. If not exists it will be created
          oneOf:
            - type: object
              required:
                - code
              properties:
                code:
                  type: string
                  maxLength: 50
                  description: Supplier code
                  example: F0001
                name:
                  type: string
                  maxLength: 100
                  description: Supplier name
                  example: Supplier srl
            - type: string
        delivery_note:
          type: object
          description: Delivery note/packing list identification
          required:
            - code
            - date
          properties:
            code:
              type: string
              maxLength: 100
              example: D123456AB
            date:
              type: string
              format: date
              example: "2021-06-09"
        movement_type:
          $ref: "#/components/schemas/movement_type"
        contents:
          description: |-
            Contents of the ASN.
            Can be either a list of items or a list of packages that contains multiple items
          type: array
          items:
            type: object
            required:
              - row_number
              - item
              - quantity
            properties:
              row_number:
                type: integer
                description: Row number, unique for an ASN
                minimum: 1
                example: 1
              item:
                $ref: "#/components/schemas/item_reference"
              quantity:
                type: number
                format: decimal
                description: Quantity expected to be received
                example: 5
              reference:
                type: string
                maxLength: 255
                description: Reference information returned to Host
                example: "5000123401"
              lot_number:
                type: string
                maxLength: 100
                description: Lot number, if enabled for the item
              serial_number:
                type: string
                maxLength: 25
                description: Serial number, if enabled for the item
              expiration_date:
                type: string
                format: date
                description: Expiration date, if enabled for the item
              expedition_date:
                type: string
                format: date
                description: Expedition date, if enabled for the item
              custom_attributes:
                $ref: "#/components/schemas/custom_attributes"
        custom_attributes:
          $ref: "#/components/schemas/custom_attributes"
    asn_received_details:
