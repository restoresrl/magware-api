          maxLength: 50
        lot_number:
          type: string
          maxLength: 100
          description: Lot number, if enabled for the item
        serial_number:
          type: string
          maxLength: 25
          description: Serial number, if enabled for the item
        expiration_date:
          type: string
          format: date
          description: Expiration date, if enabled for the item
        expedition_date:
          type: string
          format: date
