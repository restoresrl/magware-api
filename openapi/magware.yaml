                Honorific or title of the recipient (e.g. `Dott.`, `Dr.`,
                `Prof.`). Persisted alongside the destination contact data
                and may be printed on courier documents.
        courier_code:
          type: string
          maxLength: 15
          example: DHLEXP
        high_priority:
          type: boolean
          description: |-
            High priority delivery. Deprecated, use instead `priority` value.
            A `true` value set automatically `priority` value to 1000
          deprecated: true
        priority:
          type: integer
          default: 0
          description: |-
            Urgency level for processing a delivery.
            It determines the order in which deliveries
            should be fulfilled, with higher priority
            values indicating more urgent processing.
        partial_allowed:
          type: boolean
          description: |-
            Indicates whether a delivery can be fulfilled
            with a quantity lower than the requested amount.
            If `true`, the system allows partial fulfillment;
            if `false`, the delivery must be completed in full.
          default: true
        shipment_date:
          type: string
          format: date
          description: Expected shipment date
        reference:
          type: string
          maxLength: 250
          description: Reference information for the delivery, returned to Host
          example: "123456789000"
        items:
          type: array
          items:
            type: object
            required:
              - row_number
              - item
              - quantity
            properties:
              row_number:
                type: integer
                example: 1
                description: Sequential row number. Must be unique for the delivery
              item:
                $ref: "#/components/schemas/item_reference"
              quantity:
                type: number
                format: decimal
                example: 1
                description: Requested quantity
              stock_type:
                type: string
                maxLength: 50
                example: AVAIL
                description: Stock from which the delivery row must be fulfilled
              reference:
                type: string
                description: Reference information for the row, returned to Host
                maxLength: 50
              lot_number:
                type: string
                maxLength: 100
                description: Lot number requested for the item
              serial_number:
                type: string
                maxLength: 25
                description: Serial number requested for the item
              expiration_date:
                type: string
                format: date
                description: Expiration date requested for the item
              expedition_date:
                type: string
                format: date
                description: Expedition date requested for the item
              do_not_pick:
                type: boolean
                default: false
                description: Indicates that the item must not be picked and delivered
              package_type:
                type: string
                maxLength: 100
                example: BOX01
                description: Indicates the package type that must be used to pack the item
              do_not_print:
                type: boolean
                default: false
                description: Indicates that the row must not be printed on the delivery note or other documents
              parent_row:
                type:
                  - integer
                  - "null"
                description: >-
                  In case of item is a child of another item, this must indicate the parent `row_number`. If item is a
                  parent of another item, this must be set to zero. For normal row it can be `null` or not present
              custom_attributes:
                $ref: "#/components/schemas/custom_attributes"
        print_delivery:
          type: boolean
          description: Indicates that warehouse must print and apply the delivery notes
          default: false
        ship_on_demand:
          type: boolean
          default: false
          description: Indicates that the warehouse must wait for explicit confirmation before shipping the delivery
        allow_extra_items:
          type: boolean
          description: |-
            Indicates whether additional items can be added to the delivery beyond the originally requested quantity.
            - If `true`, the system allows the delivery to include quantities exceeding the customer's initial request.
            - If `false`, the delivery must strictly adhere to the requested quantity.
          default: false
        freight_term:
          type: string
          maxLength: 255
          example: Freight prepaid, Porto Franco, etc
        warehouse_annotations:
          type: string
          description: Notes specific to the warehouse (text information)
          maxLength: 255
        delivery_annotations:
          type: string
          maxLength: 255
        cash_on_delivery:
          type: object
          description: Must be present only if Cash On Delivery is requested!
          required:
            - currency
            - value
          properties:
            currency:
              type: string
              maxLength: 3
              minLength: 3
              description: 3-digit ISO 4217 Cash On Delivery currency. Conventional value is "EUR".
              example: EUR
            value:
              type: number
              description: Cash On Delivery total amount
            type:
              type: string
              maxLength: 4000
              description: Cash on delivery type, depend on courier
        billing:
          type: object
          description: Billing information.
          required:
            - code
            - name
          properties:
            code:
              type: string
              maxLength: 50
            name:
              type: string
              maxLength: 100
            description:
              type: string
              maxLength: 255
            address:
              $ref: "#/components/schemas/address"
            first_name:
              type: string
              maxLength: 500
              example: Mario
            last_name:
              type: string
              maxLength: 500
              example: Rossi
            middle_name:
              type: string
              maxLength: 500
              example: Andrea
            formal_salutation:
              type: string
              maxLength: 100
            informal_salutation:
              type: string
              maxLength: 100
        international_shipment:
          type: object
          description: International shipment information, required only for international destination!
          required:
            - currency
            - value
          properties:
            currency:
              type: string
              description: 3 digit ISO 4217 currency code of the shipment (e.g. EUR, USN, JPY, GBP, ecc)
              maxLength: 3
              example: USD
            value:
              type: number
              description: Total value of the delivery.
              format: decimal
              example: 12345.2
            incoterm:
              type: string
              maxLength: 3
              description: >-
                Shipment incoterm: DAP, DDP or EXW. For cross borders shipments the default value would be DAP in case
                it's not specified in the request differently
              example: EXW
        custom_attributes:
          $ref: "#/components/schemas/custom_attributes"
        documents:
          type: array
          items:
            $ref: "#/components/schemas/documents"
