              description: Clothing
            owner_category:
              code: "001"
              description: T-shirt
            variants:
              - code: "10"
                description: XXS
                quantity: 1
                barcodes:
                  - "1234567890123"
                volume: 0.12
                weight: 1.23
                shippable: false
            lot_control: false
            serial_number_control: false
            expiration_date_control: false
            expedition_date_control: true
            expedition_days: 0
            obsolete: false
        food&beverage:
